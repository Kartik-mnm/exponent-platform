<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Exponent Platform — Academy Management Control Panel" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Default favicon: purple-gradient E, works on all browsers without any JS -->
    <link id="favicon-el" rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-size='20' font-weight='900' fill='white'%3EE%3C/text%3E%3C/svg%3E" />

    <title>Exponent Platform</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>

    <script>
      // Apply branding (favicon + page title logo) on EVERY page load,
      // for EVERY browser — including incognito and new devices.
      // Strategy:
      //   1. Immediately apply from localStorage (instant, no flicker)
      //   2. Then fetch from server (authoritative, always up to date)
      //   3. Save fresh server data back to localStorage for next visit
      (function () {
        var API = 'https://api.exponentgrow.in';

        function applyFavicon(url) {
          if (!url) return;
          var el = document.getElementById('favicon-el');
          if (!el) { el = document.createElement('link'); el.rel = 'icon'; el.id = 'favicon-el'; document.head.appendChild(el); }
          el.type = url.endsWith('.ico') ? 'image/x-icon' : 'image/png';
          el.href = url + '?v=' + Date.now();
        }

        // Step 1: apply from localStorage immediately (zero-latency)
        try {
          var cached = localStorage.getItem('exponent_favicon_url');
          if (cached) applyFavicon(cached);
        } catch (e) {}

        // Step 2: fetch from server (authoritative source = DB)
        // Uses XMLHttpRequest so it works without ES6 modules in inline script
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API + '/platform/auth/public-branding', true);
        xhr.timeout = 5000;
        xhr.onload = function () {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              if (data.favicon_url) {
                applyFavicon(data.favicon_url);
                // Step 3: cache for next visit
                try { localStorage.setItem('exponent_favicon_url', data.favicon_url); } catch(e) {}
              }
              if (data.logo_url) {
                try { localStorage.setItem('exponent_logo_url', data.logo_url); } catch(e) {}
              }
            } catch (e) {}
          }
        };
        xhr.onerror = xhr.ontimeout = function () {}; // silently fail
        xhr.send();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
