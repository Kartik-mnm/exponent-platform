    <title>Exponent Platform</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>

    <!--
      If the platform owner uploaded a custom favicon via Settings,
      override the default E-logo with their custom one.
      This only applies to the logged-in admin panel view.
    -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('exponent_platform_favicon');
          if (saved && saved.startsWith('http')) {
            var links = document.querySelectorAll("link[rel*='icon']");
            links.forEach(function(el) { el.parentNode.removeChild(el); });
            var link = document.createElement('link');
            link.rel  = 'icon';
            link.type = saved.endsWith('.ico') ? 'image/x-icon' : 'image/png';
            link.href = saved + '?v=' + Date.now();
            document.head.appendChild(link);
          }
        } catch(e) {}
      })();
    </script>
